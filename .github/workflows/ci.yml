name: CI - Compile, Test, Lint, Security

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 bandit pip-audit

      - name: Syntax Check (compileall)
        run: python -m compileall . || true

      - name: Lint with flake8
        run: flake8 . --max-line-length=120 --exclude=.git,__pycache__ --statistics || true

      - name: Security Check (bandit)
        run: bandit -r . --exclude ./.git -ll || true

      - name: Vulnerability Check (pip-audit)
        run: pip-audit -r requirements.txt -f json -o audit.json || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: audit.json